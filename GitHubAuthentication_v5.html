<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✦ Nexus · Dev Environment</title>
  <style>
    /* ---------- Reset & Base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00F0FF; --purple: #B967FF; --bg: #0a0e1a;
      --panel: rgba(20, 28, 50, 0.6); --panel-border: rgba(120, 160, 255, 0.18);
      --text: #e6ecff; --muted: #8a95b8; --error: #ff3b5c;
      --success: #00ff9d;
    }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; color: var(--text); background: var(--bg); overflow: hidden; }
    body { background: radial-gradient(1200px 600px at 20% 10%, rgba(0,240,255,0.08), transparent 60%), radial-gradient(900px 500px at 80% 90%, rgba(185,103,255,0.1), transparent 60%), var(--bg); }

    /* ---------- Layout ---------- */
    .app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; padding: 18px; gap: 18px; }
    
    /* ---------- Top Bar ---------- */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; background: linear-gradient(90deg, rgba(0,240,255,0.12), rgba(185,103,255,0.18)); border: 1px solid var(--panel-border); border-radius: 14px; backdrop-filter: blur(14px); box-shadow: 0 0 30px rgba(0,240,255,0.12); }
    .brand { font-size: 20px; font-weight: 700; background: linear-gradient(90deg, var(--cyan), var(--purple)); -webkit-background-clip: text; color: transparent; }
    .actions { display: flex; gap: 12px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; background: rgba(255,255,255,0.04); border: 1px solid var(--panel-border); color: var(--text); cursor: pointer; transition: all .2s; }
    .icon-btn:hover { background: rgba(0,240,255,0.12); border-color: var(--cyan); box-shadow: 0 0 18px rgba(0,240,255,0.35); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ---------- Main Grid ---------- */
    .main { display: grid; grid-template-columns: 260px 1fr; gap: 18px; min-height: 0; }
    
    /* ---------- Sidebar ---------- */
    .sidebar { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 14px; padding: 18px; backdrop-filter: blur(14px); display: flex; flex-direction: column; gap: 12px; }
    .sidebar h3 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; padding-bottom: 8px; border-bottom: 2px solid var(--cyan); }
    .repo-info { padding: 12px; background: rgba(0,240,255,0.06); border: 1px solid rgba(0,240,255,0.2); border-radius: 10px; }
    .repo-name { font-weight: 600; color: var(--cyan); font-size: 14px; margin-bottom: 4px; }
    .repo-branch { font-size: 12px; color: var(--muted); font-family: monospace; }
    .stat-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); padding: 4px 0; }
    .stat-val { color: var(--text); font-weight: 500; }
    .sidebar-footer { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(0,240,255,0.06); border: 1px solid rgba(0,240,255,0.2); border-radius: 10px; font-size: 12px; color: var(--cyan); }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

    /* ---------- Content Area ---------- */
    .content { display: flex; flex-direction: column; gap: 16px; min-height: 0; }
    .controls-bar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .breadcrumbs { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); overflow-x: auto; white-space: nowrap; flex: 1; }
    .crumb { cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all .2s; }
    .crumb:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .crumb.active { color: var(--cyan); font-weight: 600; background: rgba(0,240,255,0.08); }
    .sep { opacity: 0.5; }
    
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.05); color: var(--text); transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .btn-success { border-color: rgba(0,255,157,0.3); color: var(--success); }
    .btn-success:hover { background: rgba(0,255,157,0.1); }
    .btn-danger { border-color: rgba(255,59,92,0.3); color: var(--error); }
    .btn-danger:hover { background: rgba(255,59,92,0.1); }

    .push-btn {
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: linear-gradient(90deg, #00F0FF, #B967FF);
      color: #0a0e1a;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
    }
    .push-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(185, 103, 255, 0.5); filter: brightness(1.1); }
    .push-btn:active { transform: translateY(0); }
    .push-btn:disabled { opacity: 0.7; cursor: not-allowed; filter: grayscale(0.8); }

    /* File Grid */
    .files-container { flex: 1; overflow-y: auto; padding-right: 8px; }
    .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .file-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; padding: 16px; backdrop-filter: blur(10px); cursor: pointer; transition: all .2s; display: flex; flex-direction: column; }
    .file-card:hover { transform: translateY(-2px); border-color: rgba(120,160,255,0.35); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .file-icon { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; font-size: 22px; margin-bottom: 12px; background: rgba(185,103,255,0.12); border: 1px solid rgba(185,103,255,0.3); }
    .file-icon.folder { background: rgba(0,240,255,0.12); border-color: rgba(0,240,255,0.3); }
    .filename { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .filepath { font-size: 12px; color: var(--muted); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { display: flex; gap: 8px; margin-top: 10px; font-size: 11px; color: var(--muted); }
    .tag { padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.05); font-weight: 600; font-size: 10px; text-transform: uppercase; }

    /* ---------- Modals ---------- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(10,14,26,0.9); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity .3s; }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal { background: rgba(20,28,50,0.95); border: 1px solid var(--panel-border); border-radius: 16px; width: 100%; max-width: 900px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); transform: scale(0.95); transition: transform .3s; }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--panel-border); }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: var(--error); }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--panel-border); display: flex; justify-content: space-between; align-items: center; }
    
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .form-input { background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); border-radius: 8px; padding: 12px; color: var(--text); outline: none; transition: all .2s; }
    .form-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,240,255,0.15); }
    
    textarea.code-editor { flex: 1; background: #050810; border: 1px solid var(--panel-border); border-radius: 8px; padding: 16px; color: var(--cyan); font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; resize: none; outline: none; min-height: 300px; }
    textarea.code-editor:focus { border-color: var(--purple); }

    /* Toast */
    .toast { position: fixed; bottom: 80px; right: 20px; padding: 14px 24px; border-radius: 10px; background: rgba(20,28,50,0.95); border: 1px solid var(--panel-border); backdrop-filter: blur(10px); font-size: 14px; font-weight: 600; z-index: 2000; transform: translateY(20px); opacity: 0; transition: all .3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }
    .toast.info { border-color: var(--cyan); color: var(--cyan); }

    .statusbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: rgba(10,14,26,0.8); border: 1px solid var(--panel-border); border-radius: 10px; backdrop-filter: blur(10px); font-size: 12px; font-family: monospace; color: var(--muted); }
    .keys span { color: var(--cyan); margin-right: 4px; }

    @media (max-width: 900px) { .main { grid-template-columns: 1fr; } .sidebar { display: none; } }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">✦ Nexus · Dev Env</div>
    <div class="actions">
      <button class="icon-btn" onclick="refreshRepo()" title="Refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg></button>
      <button class="icon-btn" onclick="openSettings()" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <h3>Repository</h3>
      <div class="repo-info">
        <div class="repo-name" id="ui-repo-name">Not Connected</div>
        <div class="repo-branch" id="ui-repo-branch">--</div>
      </div>
      <h3>Current Dir Stats</h3>
      <div class="stat-row"><span>Folders</span><span class="stat-val" id="stat-folders">0</span></div>
      <div class="stat-row"><span>Files</span><span class="stat-val" id="stat-files">0</span></div>
      <div class="sidebar-footer"><span class="pulse"></span><span id="auth-status">Awaiting Token</span></div>
    </aside>

    <section class="content">
      <div class="controls-bar">
        <input type="file" id="fileUploadInput" style="display:none;" onchange="handleFileUpload(event)">
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn" onclick="createNew('file')">+ File</button>
          <button class="btn btn-success" onclick="document.getElementById('fileUploadInput').click()">📤 Upload File</button>
          <button class="btn" onclick="createNew('folder')">+ Folder</button>
        </div>
      </div>
      <div class="files-container"><div class="files-grid" id="files-grid"></div></div>
    </section>
  </div>

  <footer class="statusbar">
    <div id="statusbar-path">nexus · ready</div>
    <div class="keys"><span>↑↓←→</span>navigate <span>Enter</span>open <span>Backspace</span>up</div>
  </footer>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header"><div class="modal-title">GitHub Credentials</div><button class="modal-close" onclick="closeModal('settings-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Personal Access Token (PAT)</label><input type="password" id="inp-token" class="form-input" placeholder="ghp_..."></div>
      <div class="form-group"><label class="form-label">Owner</label><input type="text" id="inp-owner" class="form-input" placeholder="username"></div>
      <div class="form-group"><label class="form-label">Repository</label><input type="text" id="inp-repo" class="form-input" placeholder="repo-name"></div>
      <div class="form-group"><label class="form-label">Branch</label><input type="text" id="inp-branch" class="form-input" value="main"></div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end;"><button class="push-btn" onclick="saveSettings()">Connect</button></div>
  </div>
</div>

<!-- Editor Modal -->
<div class="modal-overlay" id="editor-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="editor-title">Editing</div><button class="modal-close" onclick="closeModal('editor-modal')">&times;</button></div>
    <div class="modal-body">
      <textarea id="editor-code" class="code-editor" spellcheck="false"></textarea>
    </div>
    <div class="modal-footer" style="justify-content:space-between;">
      <button class="btn btn-danger" onclick="queueDelete()">Delete File</button>
      <button class="push-btn" id="editor-push-btn" onclick="directPushFromEditor()">🚀 Push to GitHub</button>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header"><div class="modal-title" id="create-title">Create New</div><button class="modal-close" onclick="closeModal('create-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Name</label><input type="text" id="create-name" class="form-input" placeholder="name.txt"></div>
      <div class="form-group" id="create-content-wrap"><label class="form-label">Initial Content</label><textarea id="create-content" class="code-editor" style="min-height:150px;"></textarea></div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end;"><button class="push-btn" onclick="executeCreate()">🚀 Push to GitHub</button></div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header"><div class="modal-title" style="color:var(--error)">Confirm Delete</div><button class="modal-close" onclick="closeModal('delete-modal')">&times;</button></div>
    <div class="modal-body"><p style="color:var(--muted)">Permanently delete <strong id="del-target" style="color:var(--text)"></strong>? This cannot be undone.</p></div>
    <div class="modal-footer" style="justify-content:flex-end;"><button class="push-btn" style="background:linear-gradient(90deg, #ff3b5c, #ff0055);" onclick="confirmDelete()">🗑️ Delete & Push</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= STATE & CONFIG ================= */
let cfg = { token:'', owner:'', repo:'', branch:'main', path:'' };
let files = [];
let currentFile = null;
let createMode = 'file';
let deleteTarget = null;
let isRefreshing = false;

/* ================= GITHUB API HELPERS ================= */
const api = async (method, path, body=null) => {
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const opts = { method, headers: { 'Authorization':`token ${cfg.token}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' } };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if(!res.ok) { const e=await res.json().catch(()=>({message:res.statusText})); throw new Error(e.message||'API Error'); }
  return res.json();
};
const b64enc = s => btoa(unescape(encodeURIComponent(s)));

/* ================= UI UTILS ================= */
const $ = id => document.getElementById(id);
const toast = (msg,type='success') => { const t=$('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.className='toast',3000); };
const openModal = id => $(id).classList.add('active');
const closeModal = id => $(id).classList.remove('active');

/* ================= AUTH & INIT ================= */
function openSettings() { $('inp-token').value=cfg.token; $('inp-owner').value=cfg.owner; $('inp-repo').value=cfg.repo; $('inp-branch').value=cfg.branch; openModal('settings-modal'); }
function saveSettings() {
  cfg.token=$('inp-token').value.trim(); cfg.owner=$('inp-owner').value.trim(); cfg.repo=$('inp-repo').value.trim(); cfg.branch=$('inp-branch').value.trim()||'main';
  if(!cfg.token||!cfg.owner||!cfg.repo) return toast('Fill all fields','error');
  localStorage.setItem('nexus_cfg', JSON.stringify(cfg));
  closeModal('settings-modal'); $('auth-status').textContent='Connected'; refreshRepo();
}

/* ================= CORE REFRESH ================= */
async function loadFiles() {
  if(!cfg.token) { openSettings(); return; }
  if (isRefreshing) return;
  isRefreshing = true;
  try {
    const data = await api('GET', cfg.path);
    files = Array.isArray(data)?data:[data];
    renderGrid(); renderCrumbs(); updateStats();
  } catch(e) { 
    toast(e.message,'error');
    // If path doesn't exist, go to root
    if (e.message.includes('404') && cfg.path) {
      cfg.path = '';
      loadFiles();
    }
  } finally {
    isRefreshing = false;
  }
}
function refreshRepo() { loadFiles(); }

/* ================= RENDERING ================= */
function renderGrid() {
  const g=$('files-grid'); g.innerHTML='';
  const sorted = [...files].sort((a,b)=>{ 
    if(a.type===b.type) return a.name.localeCompare(b.name); 
    return a.type==='dir'?-1:1; 
  });
  if(!sorted.length) { g.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">Empty directory</div>'; return; }
  sorted.forEach(f => {
    const c=document.createElement('div'); c.className='file-card';
    c.innerHTML=`<div class="file-icon ${f.type}">${f.type==='dir'?'📁':'📄'}</div><div class="filename">${f.name}</div><div class="filepath">${f.path}</div><div class="file-meta"><span class="tag">${f.type==='dir'?'FOLDER':(f.name.split('.').pop()||'file').toUpperCase()}</span></div>`;
    c.onclick=()=> f.type==='dir' ? (cfg.path=f.path, loadFiles()) : openEditor(f);
    g.appendChild(c);
  });
}
function renderCrumbs() {
  const parts=cfg.path?cfg.path.split('/'):[];
  let h=`<div class="crumb ${!parts.length?'active':''}" onclick="navTo('')">Root</div>`;
  let p=''; parts.forEach((part,i)=>{ p+=(i?'/':'')+part; h+=`<span class="sep">/</span><div class="crumb ${i===parts.length-1?'active':''}" onclick="navTo('${p}')">${part}</div>`; });
  $('breadcrumbs').innerHTML=h;
  $('statusbar-path').textContent=`${cfg.owner}/${cfg.repo} · ${cfg.path||'root'}`;
  $('ui-repo-name').textContent=`${cfg.owner}/${cfg.repo}`; $('ui-repo-branch').textContent=`branch: ${cfg.branch}`;
}
function updateStats() { 
  const dirs = files.filter(f=>f.type==='dir').length; 
  const fileCount = files.filter(f=>f.type!=='dir').length;
  $('stat-folders').textContent=dirs; 
  $('stat-files').textContent=fileCount; 
}
function navTo(p) { cfg.path=p; loadFiles(); }

/* ================= EDITOR & DIRECT PUSH ================= */
async function openEditor(file) {
  currentFile=file; $('editor-title').textContent=`Editing: ${file.name}`; $('editor-code').value='Loading...'; openModal('editor-modal');
  try { const r=await fetch(file.download_url); $('editor-code').value=await r.text(); } catch(e) { $('editor-code').value=`Error: ${e.message}`; }
}

async function directPushFromEditor() {
  if(!currentFile) return;
  const newContent = $('editor-code').value;
  const btn = $('editor-push-btn');
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ Pushing...';
  btn.disabled = true;

  try {
    await api('PUT', currentFile.path, {
      message: 'Update via Nexus Dev Env',
      content: b64enc(newContent),
      sha: currentFile.sha,
      branch: cfg.branch
    });
    toast(`"${currentFile.name}" pushed successfully!`);
    closeModal('editor-modal');
    await loadFiles(); // Force refresh after push
  } catch(e) {
    toast(`Push failed: ${e.message}`, 'error');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

function queueDelete() {
  if(!currentFile) return;
  deleteTarget = currentFile;
  $('del-target').textContent = currentFile.name;
  closeModal('editor-modal');
  openModal('delete-modal');
}

async function confirmDelete() {
  if(!deleteTarget) return;
  const btn = event.target;
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ Deleting...';
  btn.disabled = true;

  try {
    await api('DELETE', deleteTarget.path, {
      message: 'Delete via Nexus Dev Env',
      sha: deleteTarget.sha,
      branch: cfg.branch
    });
    toast(`"${deleteTarget.name}" deleted and pushed!`);
    closeModal('delete-modal');
    await loadFiles(); // Force refresh after delete
  } catch(e) {
    toast(`Delete failed: ${e.message}`, 'error');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
    deleteTarget = null;
  }
}

/* ================= CREATE ================= */
function createNew(type) { createMode=type; $('create-title').textContent=`Create ${type==='file'?'File':'Folder'}`; $('create-name').value=''; $('create-content').value=''; $('create-content-wrap').style.display=type==='file'?'flex':'none'; openModal('create-modal'); }
async function executeCreate() {
  const name=$('create-name').value.trim(); if(!name) return toast('Name required','error');
  const path = cfg.path?`${cfg.path}/${name}`:name;
  const actualPath = createMode==='folder'?`${path}/.gitkeep`:path;
  const content = createMode==='folder'?'':$('create-content').value;
  
  const btn = event.target;
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ Creating...';
  btn.disabled = true;

  try {
    await api('PUT', actualPath, {
      message: 'Create via Nexus Dev Env',
      content: b64enc(content),
      branch: cfg.branch
    });
    toast(`"${name}" created and pushed!`);
    closeModal('create-modal');
    await loadFiles(); // Force refresh after create
  } catch(e) {
    toast(`Creation failed: ${e.message}`, 'error');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

/* ================= FILE UPLOAD (COMMIT & PUSH) ================= */
async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const commitMessage = `Upload ${file.name} via Nexus Dev Env`;
  toast(`⏳ Uploading ${file.name}...`, 'info');

  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64Content = e.target.result.split(',')[1];
    const filePath = cfg.path ? `${cfg.path}/${file.name}` : file.name;

    try {
      // Check if file exists to get SHA for update
      let sha = null;
      try {
        const check = await api('GET', filePath);
        sha = check.sha;
      } catch (err) { /* file does not exist, sha stays null */ }

      await api('PUT', filePath, {
        message: commitMessage,
        content: base64Content,
        sha: sha || undefined,
        branch: cfg.branch
      });

      toast(`✅ '${file.name}' uploaded and pushed!`, 'success');
      await loadFiles(); // Force refresh after upload
    } catch (err) {
      toast(`❌ Upload failed: ${err.message}`, 'error');
    }
    event.target.value = ''; // reset input
  };
  reader.readAsDataURL(file);
}

/* ================= KEYBOARD NAV ================= */
document.addEventListener('keydown', e => {
  if(document.querySelector('.modal-overlay.active')) { 
    if(e.key==='Escape') document.querySelectorAll('.modal-overlay.active').forEach(m=>m.classList.remove('active')); 
    return; 
  }
  if(e.key==='Backspace'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA') { 
    e.preventDefault(); 
    if(cfg.path){
      const p=cfg.path.split('/');
      p.pop();
      navTo(p.join('/'));
    } 
  }
});

/* ================= BOOTSTRAP ================= */
window.onload = () => {
  const saved = localStorage.getItem('nexus_cfg');
  if(saved) { 
    cfg=JSON.parse(saved); 
    $('auth-status').textContent='Connected'; 
    loadFiles(); 
  } else {
    openSettings(); 
  }
};
</script>
