<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✦ Nexus · Dev Environment</title>
  <style>
    /* ---------- Reset & Base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00F0FF; --purple: #B967FF; --bg: #0a0e1a;
      --panel: rgba(20, 28, 50, 0.6); --panel-border: rgba(120, 160, 255, 0.18);
      --text: #e6ecff; --muted: #8a95b8; --error: #ff3b5c;
      --success: #00ff9d; --warning: #ffb347;
    }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; color: var(--text); background: var(--bg); overflow: hidden; }
    body { background: radial-gradient(1200px 600px at 20% 10%, rgba(0,240,255,0.08), transparent 60%), radial-gradient(900px 500px at 80% 90%, rgba(185,103,255,0.1), transparent 60%), var(--bg); }

    /* ---------- Layout ---------- */
    .app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; padding: 18px; gap: 18px; }
    
    /* ---------- Top Bar ---------- */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; background: linear-gradient(90deg, rgba(0,240,255,0.12), rgba(185,103,255,0.18)); border: 1px solid var(--panel-border); border-radius: 14px; backdrop-filter: blur(14px); box-shadow: 0 0 30px rgba(0,240,255,0.12); }
    .brand { font-size: 20px; font-weight: 700; background: linear-gradient(90deg, var(--cyan), var(--purple)); -webkit-background-clip: text; color: transparent; }
    .actions { display: flex; gap: 12px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; background: rgba(255,255,255,0.04); border: 1px solid var(--panel-border); color: var(--text); cursor: pointer; transition: all .2s; }
    .icon-btn:hover { background: rgba(0,240,255,0.12); border-color: var(--cyan); box-shadow: 0 0 18px rgba(0,240,255,0.35); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ---------- Main Grid ---------- */
    .main { display: grid; grid-template-columns: 260px 1fr; gap: 18px; min-height: 0; }
    
    /* ---------- Sidebar ---------- */
    .sidebar { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 14px; padding: 18px; backdrop-filter: blur(14px); display: flex; flex-direction: column; gap: 12px; }
    .sidebar h3 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; padding-bottom: 8px; border-bottom: 2px solid var(--cyan); }
    .repo-info { padding: 12px; background: rgba(0,240,255,0.06); border: 1px solid rgba(0,240,255,0.2); border-radius: 10px; }
    .repo-name { font-weight: 600; color: var(--cyan); font-size: 14px; margin-bottom: 4px; }
    .repo-branch { font-size: 12px; color: var(--muted); font-family: monospace; }
    .stat-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); padding: 4px 0; }
    .stat-val { color: var(--text); font-weight: 500; }
    .sidebar-footer { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(0,240,255,0.06); border: 1px solid rgba(0,240,255,0.2); border-radius: 10px; font-size: 12px; color: var(--cyan); }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

    /* ---------- Content Area ---------- */
    .content { display: flex; flex-direction: column; gap: 16px; min-height: 0; }
    .controls-bar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .breadcrumbs { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); overflow-x: auto; white-space: nowrap; flex: 1; }
    .crumb { cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all .2s; }
    .crumb:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .crumb.active { color: var(--cyan); font-weight: 600; background: rgba(0,240,255,0.08); }
    .sep { opacity: 0.5; }

    /* File Search Bar */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 4px 12px;
      transition: all .2s;
      min-width: 200px;
    }
    .search-bar:focus-within {
      border-color: var(--cyan);
      box-shadow: 0 0 15px rgba(0,240,255,0.1);
    }
    .search-bar input {
      background: transparent;
      border: none;
      color: var(--text);
      padding: 6px 0;
      outline: none;
      font-size: 13px;
      width: 100%;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .search-bar input::placeholder {
      color: var(--muted);
      font-size: 12px;
    }
    .search-bar .search-icon {
      color: var(--muted);
      font-size: 16px;
      opacity: 0.6;
    }
    .search-bar .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      opacity: 0.4;
      transition: all .2s;
      display: none;
    }
    .search-bar .clear-btn:hover {
      opacity: 1;
      color: var(--text);
    }
    .search-bar .clear-btn.visible {
      display: block;
    }
    .search-count {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      font-family: monospace;
    }
    
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.05); color: var(--text); transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .btn-success { border-color: rgba(0,255,157,0.3); color: var(--success); }
    .btn-success:hover { background: rgba(0,255,157,0.1); }
    .btn-danger { border-color: rgba(255,59,92,0.3); color: var(--error); }
    .btn-danger:hover { background: rgba(255,59,92,0.1); }
    .btn-warning { border-color: rgba(255,179,71,0.3); color: var(--warning); }
    .btn-warning:hover { background: rgba(255,179,71,0.1); }

    .push-btn {
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: linear-gradient(90deg, #00F0FF, #B967FF);
      color: #0a0e1a;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
    }
    .push-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(185, 103, 255, 0.5); filter: brightness(1.1); }
    .push-btn:active { transform: translateY(0); }
    .push-btn:disabled { opacity: 0.7; cursor: not-allowed; filter: grayscale(0.8); }

    /* File Grid */
    .files-container { flex: 1; overflow-y: auto; padding-right: 8px; }
    .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .file-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; padding: 16px; backdrop-filter: blur(10px); cursor: pointer; transition: all .2s; display: flex; flex-direction: column; position: relative; }
    .file-card:hover { transform: translateY(-2px); border-color: rgba(120,160,255,0.35); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .file-card.hidden { display: none; }
    .file-card .highlight { background: rgba(0,240,255,0.2); padding: 0 2px; border-radius: 2px; }
    .file-icon { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; font-size: 22px; margin-bottom: 12px; background: rgba(185,103,255,0.12); border: 1px solid rgba(185,103,255,0.3); }
    .file-icon.folder { background: rgba(0,240,255,0.12); border-color: rgba(0,240,255,0.3); }
    .filename { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .filepath { font-size: 12px; color: var(--muted); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { display: flex; gap: 8px; margin-top: 10px; font-size: 11px; color: var(--muted); }
    .tag { padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.05); font-weight: 600; font-size: 10px; text-transform: uppercase; }
    .file-actions { display: flex; gap: 6px; margin-top: 8px; }
    .file-actions .btn-sm { padding: 3px 8px; font-size: 11px; border-radius: 4px; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.03); color: var(--muted); cursor: pointer; transition: all .2s; }
    .file-actions .btn-sm:hover { background: rgba(0,240,255,0.1); color: var(--text); border-color: var(--cyan); }
    .file-actions .btn-sm.download:hover { border-color: var(--success); color: var(--success); }

    /* ---------- Modals ---------- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(10,14,26,0.9); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity .3s; }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal { background: rgba(20,28,50,0.95); border: 1px solid var(--panel-border); border-radius: 16px; width: 100%; max-width: 950px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); transform: scale(0.95); transition: transform .3s; }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--panel-border); }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
    .modal-close:hover { color: var(--error); }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--panel-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .form-input { background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); border-radius: 8px; padding: 12px; color: var(--text); outline: none; transition: all .2s; font-family: 'Consolas', monospace; }
    .form-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,240,255,0.15); }
    
    .history-list { max-height: 120px; overflow-y: auto; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); }
    .history-item { padding: 8px 12px; cursor: pointer; transition: all .2s; font-size: 13px; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: rgba(0,240,255,0.08); color: var(--text); }
    .history-item .repo-label { font-weight: 500; color: var(--cyan); }
    .history-item .branch-label { font-size: 11px; color: var(--muted); }
    .history-item .remove-history { color: var(--error); background: none; border: none; cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0.5; transition: opacity .2s; }
    .history-item .remove-history:hover { opacity: 1; }
    .history-empty { padding: 12px; text-align: center; color: var(--muted); font-size: 13px; }

    .quick-history { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .quick-repo-btn { 
      padding: 4px 12px; 
      border-radius: 6px; 
      font-size: 11px; 
      font-weight: 500;
      background: rgba(0,240,255,0.08); 
      border: 1px solid rgba(0,240,255,0.15);
      color: var(--cyan);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .quick-repo-btn:hover { 
      background: rgba(0,240,255,0.18); 
      transform: translateY(-1px);
      box-shadow: 0 0 15px rgba(0,240,255,0.15);
    }

    /* Editor with regex support */
    .editor-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; }
    .editor-toolbar { display: flex; gap: 8px; padding: 8px 0; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--panel-border); margin-bottom: 8px; }
    .editor-toolbar .toolbar-group { display: flex; gap: 4px; align-items: center; }
    .editor-toolbar .toolbar-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .editor-toolbar input[type="text"] { background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 12px; outline: none; width: 140px; }
    .editor-toolbar input[type="text"]:focus { border-color: var(--cyan); }
    .editor-toolbar .regex-btn { padding: 3px 10px; border-radius: 4px; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.03); color: var(--muted); cursor: pointer; font-size: 11px; transition: all .2s; }
    .editor-toolbar .regex-btn:hover { background: rgba(0,240,255,0.08); border-color: var(--cyan); color: var(--text); }
    .editor-toolbar .regex-btn.active { background: rgba(0,240,255,0.15); border-color: var(--cyan); color: var(--cyan); }
    .editor-toolbar .regex-btn.replace-mode { border-color: var(--warning); color: var(--warning); }
    .editor-toolbar .regex-btn.replace-mode.active { background: rgba(255,179,71,0.15); border-color: var(--warning); color: var(--warning); }
    .editor-toolbar .regex-count { font-size: 12px; color: var(--muted); font-family: monospace; min-width: 80px; }

    textarea.code-editor { 
      flex: 1; 
      background: #050810; 
      border: 1px solid var(--panel-border); 
      border-radius: 8px; 
      padding: 16px; 
      color: var(--cyan); 
      font-family: 'Consolas', 'Monaco', monospace; 
      font-size: 14px; 
      line-height: 1.8; 
      resize: none; 
      outline: none; 
      min-height: 300px;
      tab-size: 2;
    }
    textarea.code-editor:focus { border-color: var(--purple); }

    .replace-row { display: flex; gap: 8px; align-items: center; padding: 4px 0; flex-wrap: wrap; }
    .replace-row input { background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 12px; outline: none; flex: 1; min-width: 80px; }
    .replace-row input:focus { border-color: var(--cyan); }

    .toast { position: fixed; bottom: 80px; right: 20px; padding: 14px 24px; border-radius: 10px; background: rgba(20,28,50,0.95); border: 1px solid var(--panel-border); backdrop-filter: blur(10px); font-size: 14px; font-weight: 600; z-index: 2000; transform: translateY(20px); opacity: 0; transition: all .3s; max-width: 400px; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }
    .toast.info { border-color: var(--cyan); color: var(--cyan); }
    .toast.warning { border-color: var(--warning); color: var(--warning); }

    .statusbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: rgba(10,14,26,0.8); border: 1px solid var(--panel-border); border-radius: 10px; backdrop-filter: blur(10px); font-size: 12px; font-family: monospace; color: var(--muted); }
    .keys span { color: var(--cyan); margin-right: 4px; }

    @media (max-width: 900px) { .main { grid-template-columns: 1fr; } .sidebar { display: none; } }
    @media (max-width: 600px) { .quick-history { display: none; } .search-bar { min-width: 120px; } }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">✦ Nexus · Dev Env</div>
    <div class="quick-history" id="quick-history"></div>
    <div class="actions">
      <button class="icon-btn" onclick="refreshRepo()" title="Refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg></button>
      <button class="icon-btn" onclick="openSettings()" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <h3>Repository</h3>
      <div class="repo-info">
        <div class="repo-name" id="ui-repo-name">Not Connected</div>
        <div class="repo-branch" id="ui-repo-branch">--</div>
      </div>
      <h3>Current Dir Stats</h3>
      <div class="stat-row"><span>Folders</span><span class="stat-val" id="stat-folders">0</span></div>
      <div class="stat-row"><span>Files</span><span class="stat-val" id="stat-files">0</span></div>
      <div class="sidebar-footer"><span class="pulse"></span><span id="auth-status">Awaiting Token</span></div>
    </aside>

    <section class="content">
      <div class="controls-bar">
        <input type="file" id="fileUploadInput" style="display:none;" onchange="handleFileUpload(event)">
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <!-- File Search Bar -->
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="file-search-input" placeholder="Search files..." oninput="filterFiles()" onkeydown="if(event.key==='Escape'){clearSearch();}">
            <button class="clear-btn" id="search-clear-btn" onclick="clearSearch()">✕</button>
            <span class="search-count" id="search-count"></span>
          </div>
          <button class="btn" onclick="createNew('file')">+ File</button>
          <button class="btn btn-success" onclick="document.getElementById('fileUploadInput').click()">📤 Upload</button>
          <button class="btn" onclick="createNew('folder')">+ Folder</button>
        </div>
      </div>
      <div class="files-container"><div class="files-grid" id="files-grid"></div></div>
    </section>
  </div>

  <footer class="statusbar">
    <div id="statusbar-path">nexus · ready</div>
    <div class="keys"><span>↑↓←→</span>navigate <span>Enter</span>open <span>Backspace</span>up</div>
  </footer>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header"><div class="modal-title">GitHub Credentials</div><button class="modal-close" onclick="closeModal('settings-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Personal Access Token (PAT)</label>
        <input type="password" id="inp-token" class="form-input" placeholder="ghp_..." onkeydown="if(event.key==='Enter') connectRepo()">
      </div>
      <div class="form-group">
        <label class="form-label">Owner</label>
        <input type="text" id="inp-owner" class="form-input" placeholder="username" onkeydown="if(event.key==='Enter') connectRepo()">
      </div>
      <div class="form-group">
        <label class="form-label">Repository</label>
        <input type="text" id="inp-repo" class="form-input" placeholder="repo-name" onkeydown="if(event.key==='Enter') connectRepo()">
      </div>
      <div class="form-group">
        <label class="form-label">Branch</label>
        <input type="text" id="inp-branch" class="form-input" value="main" onkeydown="if(event.key==='Enter') connectRepo()">
      </div>
      
      <div class="form-group">
        <label class="form-label">Recent Repositories</label>
        <div id="history-container" class="history-list"></div>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end;">
      <button class="push-btn" id="connect-btn" onclick="connectRepo()">Connect</button>
    </div>
  </div>
</div>

<!-- Editor Modal with Regex Support -->
<div class="modal-overlay" id="editor-modal">
  <div class="modal" style="max-width:950px;">
    <div class="modal-header">
      <div class="modal-title" id="editor-title">Editing</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="modal-close" onclick="closeModal('editor-modal')">&times;</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="editor-wrapper">
        <div class="editor-toolbar">
          <div class="toolbar-group">
            <span class="toolbar-label">Find:</span>
            <input type="text" id="find-input" placeholder="Search..." oninput="performSearch()" onkeydown="if(event.key==='Enter'){event.preventDefault(); findNext();}">
          </div>
          <div class="toolbar-group">
            <button class="regex-btn" id="regex-btn" onclick="toggleRegex()" title="Use regular expressions">.*</button>
            <button class="regex-btn" id="case-btn" onclick="toggleCase()" title="Case sensitive">Aa</button>
            <button class="regex-btn" id="replace-btn" onclick="toggleReplace()" title="Replace mode">↻</button>
          </div>
          <div class="toolbar-group">
            <span class="regex-count" id="match-count">0 matches</span>
          </div>
        </div>
        <div id="replace-row" class="replace-row" style="display:none;">
          <span class="toolbar-label">Replace:</span>
          <input type="text" id="replace-input" placeholder="Replace with..." onkeydown="if(event.key==='Enter'){event.preventDefault(); performReplace();}">
          <button class="regex-btn replace-mode active" onclick="performReplace()">Replace</button>
          <button class="regex-btn" onclick="performReplaceAll()">Replace All</button>
        </div>
        <textarea id="editor-code" class="code-editor" spellcheck="false"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <div style="display:flex;gap:8px;">
        <button class="btn btn-danger" onclick="queueDelete()">🗑️ Delete</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn" onclick="downloadCurrentFile()">⬇️ Download</button>
        <button class="push-btn" id="editor-push-btn" onclick="directPushFromEditor()">🚀 Push</button>
      </div>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header"><div class="modal-title" id="create-title">Create New</div><button class="modal-close" onclick="closeModal('create-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Name</label><input type="text" id="create-name" class="form-input" placeholder="name.txt" onkeydown="if(event.key==='Enter') executeCreate()"></div>
      <div class="form-group" id="create-content-wrap"><label class="form-label">Initial Content</label><textarea id="create-content" class="code-editor" style="min-height:150px;" onkeydown="if(event.key==='Enter' && event.ctrlKey) executeCreate()"></textarea></div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end;"><button class="push-btn" onclick="executeCreate()">🚀 Push</button></div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header"><div class="modal-title" style="color:var(--error)">Confirm Delete</div><button class="modal-close" onclick="closeModal('delete-modal')">&times;</button></div>
    <div class="modal-body"><p style="color:var(--muted)">Permanently delete <strong id="del-target" style="color:var(--text)"></strong>? This cannot be undone.</p></div>
    <div class="modal-footer" style="justify-content:flex-end;">
      <button class="push-btn" style="background:linear-gradient(90deg, #ff3b5c, #ff0055);" onclick="confirmDelete()">🗑️ Delete & Push</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= STATE & CONFIG ================= */
let cfg = { token:'', owner:'', repo:'', branch:'main', path:'' };
let files = [];
let currentFile = null;
let createMode = 'file';
let deleteTarget = null;
let isRefreshing = false;
let allFiles = []; // Store all files for filtering

// Regex/Find state
let searchRegex = false;
let caseSensitive = false;
let replaceMode = false;
let currentMatchIndex = -1;
let matches = [];
let isSearching = false;

const HISTORY_KEY = 'nexus_history';
let repoHistory = [];

/* ================= HISTORY FUNCTIONS ================= */
function loadHistory() {
  try {
    const data = localStorage.getItem(HISTORY_KEY);
    repoHistory = data ? JSON.parse(data) : [];
    const seen = new Set();
    repoHistory = repoHistory.filter(item => {
      const key = `${item.owner}/${item.repo}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    if (repoHistory.length > 10) repoHistory = repoHistory.slice(0, 10);
  } catch { repoHistory = []; }
  renderHistory();
  renderQuickHistory();
}

function saveHistory() {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(repoHistory));
  } catch {}
  renderHistory();
  renderQuickHistory();
}

function addToHistory(owner, repo, branch, token) {
  repoHistory = repoHistory.filter(item => !(item.owner === owner && item.repo === repo));
  repoHistory.unshift({ owner, repo, branch, token, lastUsed: Date.now() });
  if (repoHistory.length > 10) repoHistory.pop();
  saveHistory();
}

function removeFromHistory(index) {
  repoHistory.splice(index, 1);
  saveHistory();
}

function renderHistory() {
  const container = document.getElementById('history-container');
  if (!repoHistory.length) {
    container.innerHTML = `<div class="history-empty">No recent repositories</div>`;
    return;
  }
  container.innerHTML = repoHistory.map((item, idx) => `
    <div class="history-item" onclick="loadFromHistory(${idx})">
      <span><span class="repo-label">${item.owner}/${item.repo}</span> <span class="branch-label">${item.branch}</span></span>
      <button class="remove-history" onclick="event.stopPropagation(); removeFromHistory(${idx})" title="Remove from history">✕</button>
    </div>
  `).join('');
}

function renderQuickHistory() {
  const container = document.getElementById('quick-history');
  if (!repoHistory.length) {
    container.innerHTML = '';
    return;
  }
  const quickItems = repoHistory.slice(0, 3);
  container.innerHTML = quickItems.map(item => `
    <button class="quick-repo-btn" onclick="switchToRepo('${item.owner}', '${item.repo}', '${item.branch}', '${item.token}')" title="${item.owner}/${item.repo}">
      ${item.owner}/${item.repo}
    </button>
  `).join('');
}

function switchToRepo(owner, repo, branch, token) {
  cfg.token = token;
  cfg.owner = owner;
  cfg.repo = repo;
  cfg.branch = branch || 'main';
  cfg.path = '';
  
  localStorage.setItem('nexus_cfg', JSON.stringify(cfg));
  $('auth-status').textContent='Connected';
  toast(`Switched to ${owner}/${repo}`, 'success');
  loadFiles();
}

function loadFromHistory(index) {
  const item = repoHistory[index];
  if (!item) return;
  document.getElementById('inp-token').value = item.token || '';
  document.getElementById('inp-owner').value = item.owner || '';
  document.getElementById('inp-repo').value = item.repo || '';
  document.getElementById('inp-branch').value = item.branch || 'main';
  connectRepo();
}

/* ================= GITHUB API HELPERS ================= */
const api = async (method, path, body=null) => {
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const opts = { method, headers: { 'Authorization':`token ${cfg.token}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' } };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if(!res.ok) { const e=await res.json().catch(()=>({message:res.statusText})); throw new Error(e.message||'API Error'); }
  return res.json();
};
const b64enc = s => btoa(unescape(encodeURIComponent(s)));

/* ================= UI UTILS ================= */
const $ = id => document.getElementById(id);
const toast = (msg,type='success') => { 
  const t=$('toast'); 
  t.textContent=msg; 
  t.className=`toast show ${type}`; 
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.className='toast',3000); 
};
const openModal = id => $(id).classList.add('active');
const closeModal = id => $(id).classList.remove('active');

/* ================= AUTH & CONNECT ================= */
function openSettings() { 
  $('inp-token').value=cfg.token; 
  $('inp-owner').value=cfg.owner; 
  $('inp-repo').value=cfg.repo; 
  $('inp-branch').value=cfg.branch; 
  loadHistory();
  openModal('settings-modal'); 
  setTimeout(() => $('inp-token').focus(), 100);
}

function connectRepo() {
  const token = $('inp-token').value.trim();
  const owner = $('inp-owner').value.trim();
  const repo = $('inp-repo').value.trim();
  const branch = $('inp-branch').value.trim() || 'main';
  
  if(!token || !owner || !repo) return toast('Fill all fields','error');
  
  cfg.token = token;
  cfg.owner = owner;
  cfg.repo = repo;
  cfg.branch = branch;
  cfg.path = '';
  
  addToHistory(owner, repo, branch, token);
  
  localStorage.setItem('nexus_cfg', JSON.stringify(cfg));
  closeModal('settings-modal');
  $('auth-status').textContent='Connected';
  toast(`Connected to ${owner}/${repo}`, 'success');
  loadFiles();
}

/* ================= CORE REFRESH ================= */
async function loadFiles() {
  if(!cfg.token || !cfg.owner || !cfg.repo) { openSettings(); return; }
  if (isRefreshing) return;
  isRefreshing = true;
  try {
    const data = await api('GET', cfg.path);
    files = Array.isArray(data) ? data : [data];
    allFiles = [...files]; // Store for filtering
    renderGrid(); renderCrumbs(); updateStats();
    // Clear search when loading new directory
    clearSearch();
  } catch(e) { 
    if (e.message.includes('404') && cfg.path) {
      cfg.path = '';
      try {
        const data = await api('GET', cfg.path);
        files = Array.isArray(data) ? data : [data];
        allFiles = [...files];
        renderGrid(); renderCrumbs(); updateStats();
        clearSearch();
      } catch(err) {
        toast(err.message, 'error');
      }
    } else {
      toast(e.message, 'error');
    }
  } finally {
    isRefreshing = false;
  }
}
function refreshRepo() { loadFiles(); }

/* ================= FILE SEARCH / FILTER ================= */
function filterFiles() {
  const searchInput = $('file-search-input');
  const query = searchInput.value.trim().toLowerCase();
  const clearBtn = $('search-clear-btn');
  const countEl = $('search-count');
  const cards = document.querySelectorAll('.file-card');
  
  if (query === '') {
    clearBtn.classList.remove('visible');
    countEl.textContent = '';
    cards.forEach(card => card.classList.remove('hidden'));
    return;
  }
  
  clearBtn.classList.add('visible');
  let visibleCount = 0;
  
  cards.forEach(card => {
    const filename = card.querySelector('.filename')?.textContent?.toLowerCase() || '';
    const filepath = card.querySelector('.filepath')?.textContent?.toLowerCase() || '';
    const match = filename.includes(query) || filepath.includes(query);
    
    if (match) {
      card.classList.remove('hidden');
      visibleCount++;
      // Highlight the matched text in filename
      const nameEl = card.querySelector('.filename');
      if (nameEl) {
        const name = nameEl.textContent;
        const idx = name.toLowerCase().indexOf(query);
        if (idx !== -1) {
          const highlighted = name.substring(0, idx) + 
            `<span class="highlight">${name.substring(idx, idx + query.length)}</span>` + 
            name.substring(idx + query.length);
          nameEl.innerHTML = highlighted;
        } else {
          nameEl.innerHTML = name;
        }
      }
    } else {
      card.classList.add('hidden');
    }
  });
  
  countEl.textContent = `${visibleCount} / ${cards.length}`;
}

function clearSearch() {
  const searchInput = $('file-search-input');
  searchInput.value = '';
  $('search-clear-btn').classList.remove('visible');
  $('search-count').textContent = '';
  document.querySelectorAll('.file-card').forEach(card => {
    card.classList.remove('hidden');
    // Restore original filename
    const nameEl = card.querySelector('.filename');
    if (nameEl) {
      nameEl.innerHTML = nameEl.textContent;
    }
  });
}

/* ================= RENDERING ================= */
function renderGrid() {
  const g=$('files-grid'); 
  if (!g) return;
  g.innerHTML='';
  const sorted = [...files].sort((a,b)=>{ 
    if(a.type===b.type) return a.name.localeCompare(b.name); 
    return a.type==='dir' ? -1 : 1; 
  });
  if(!sorted.length) { 
    g.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;font-size:14px;">📂 Empty directory</div>'; 
    return; 
  }
  sorted.forEach(f => {
    const c=document.createElement('div'); c.className='file-card';
    c.innerHTML=`
      <div class="file-icon ${f.type}">${f.type==='dir'?'📁':'📄'}</div>
      <div class="filename">${f.name}</div>
      <div class="filepath">${f.path}</div>
      <div class="file-meta"><span class="tag">${f.type==='dir'?'FOLDER':(f.name.split('.').pop()||'file').toUpperCase()}</span></div>
      ${f.type!=='dir' ? `
        <div class="file-actions">
          <button class="btn-sm download" onclick="event.stopPropagation(); downloadFile('${f.path}', '${f.name}')">⬇️ Download</button>
        </div>
      ` : ''}
    `;
    c.onclick=()=> f.type==='dir' ? (cfg.path=f.path, loadFiles()) : openEditor(f);
    g.appendChild(c);
  });
}
function renderCrumbs() {
  const parts=cfg.path?cfg.path.split('/'):[];
  let h=`<div class="crumb ${!parts.length?'active':''}" onclick="navTo('')">Root</div>`;
  let p=''; parts.forEach((part,i)=>{ p+=(i?'/':'')+part; h+=`<span class="sep">/</span><div class="crumb ${i===parts.length-1?'active':''}" onclick="navTo('${p}')">${part}</div>`; });
  $('breadcrumbs').innerHTML=h;
  $('statusbar-path').textContent=`${cfg.owner}/${cfg.repo} · ${cfg.path||'root'}`;
  $('ui-repo-name').textContent=`${cfg.owner}/${cfg.repo}`; 
  $('ui-repo-branch').textContent=`branch: ${cfg.branch}`;
}
function updateStats() { 
  const dirs = files.filter(f=>f.type==='dir').length; 
  const fileCount = files.filter(f=>f.type!=='dir').length;
  $('stat-folders').textContent=dirs; 
  $('stat-files').textContent=fileCount; 
}
function navTo(p) { cfg.path=p; loadFiles(); }

/* ================= FILE DOWNLOAD ================= */
async function downloadFile(path, name) {
  try {
    const data = await api('GET', path);
    const content = atob(data.content);
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`Downloaded ${name}`, 'success');
  } catch(e) {
    toast(`Download failed: ${e.message}`, 'error');
  }
}

async function downloadCurrentFile() {
  if (!currentFile) return;
  await downloadFile(currentFile.path, currentFile.name);
}

/* ================= REGEX / SEARCH FUNCTIONS ================= */
function toggleRegex() {
  searchRegex = !searchRegex;
  $('regex-btn').classList.toggle('active');
  performSearch();
}

function toggleCase() {
  caseSensitive = !caseSensitive;
  $('case-btn').classList.toggle('active');
  performSearch();
}

function toggleReplace() {
  replaceMode = !replaceMode;
  $('replace-btn').classList.toggle('active');
  $('replace-row').style.display = replaceMode ? 'flex' : 'none';
  if (!replaceMode) performSearch();
}

function performSearch() {
  if (isSearching) return;
  isSearching = true;
  
  const textarea = $('editor-code');
  const findInput = $('find-input');
  const query = findInput.value;
  const content = textarea.value;
  const countEl = $('match-count');
  
  if (!query) {
    countEl.textContent = '0 matches';
    matches = [];
    currentMatchIndex = -1;
    isSearching = false;
    return;
  }

  try {
    let flags = 'g';
    if (!caseSensitive) flags += 'i';
    
    let regex;
    if (searchRegex) {
      regex = new RegExp(query, flags);
    } else {
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      regex = new RegExp(escaped, flags);
    }
    
    matches = [];
    let match;
    regex.lastIndex = 0;
    while ((match = regex.exec(content)) !== null) {
      matches.push({ 
        index: match.index, 
        length: match[0].length,
        text: match[0]
      });
      if (match[0].length === 0) {
        regex.lastIndex = match.index + 1;
      }
    }
    
    countEl.textContent = `${matches.length} matches`;
    currentMatchIndex = matches.length > 0 ? 0 : -1;
    
    if (matches.length > 0 && document.activeElement !== findInput) {
      highlightMatch(0, false);
    }
  } catch(e) {
    countEl.textContent = 'Invalid regex';
    matches = [];
    currentMatchIndex = -1;
  }
  
  isSearching = false;
}

function highlightMatch(index, focusEditor = true) {
  const textarea = $('editor-code');
  const findInput = $('find-input');
  
  if (index < 0 || index >= matches.length) return;
  
  const match = matches[index];
  if (focusEditor && document.activeElement !== findInput) {
    textarea.focus();
    textarea.setSelectionRange(match.index, match.index + match.length);
  } else {
    textarea.setSelectionRange(match.index, match.index + match.length);
  }
  currentMatchIndex = index;
  
  $('match-count').textContent = `${index+1}/${matches.length} matches`;
}

function findNext() {
  if (matches.length === 0) return;
  const nextIndex = (currentMatchIndex + 1) % matches.length;
  highlightMatch(nextIndex, true);
}

function performReplace() {
  const textarea = $('editor-code');
  const replaceInput = $('replace-input');
  const findInput = $('find-input');
  
  if (!findInput.value || matches.length === 0) return;
  
  const match = matches[currentMatchIndex];
  if (!match) return;
  
  const before = textarea.value.substring(0, match.index);
  const after = textarea.value.substring(match.index + match.length);
  const replaceText = replaceInput.value;
  
  textarea.value = before + replaceText + after;
  
  const newPos = match.index + replaceText.length;
  textarea.setSelectionRange(newPos, newPos);
  
  performSearch();
  if (matches.length > 0) {
    const nextIdx = Math.min(currentMatchIndex, matches.length - 1);
    highlightMatch(nextIdx, false);
  }
  
  toast(`Replaced match`, 'info');
}

function performReplaceAll() {
  const textarea = $('editor-code');
  const findInput = $('find-input');
  const replaceInput = $('replace-input');
  
  if (!findInput.value) return;
  
  try {
    let flags = 'g';
    if (!caseSensitive) flags += 'i';
    let regex;
    if (searchRegex) {
      regex = new RegExp(findInput.value, flags);
    } else {
      regex = new RegExp(findInput.value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);
    }
    
    const original = textarea.value;
    const replaced = original.replace(regex, replaceInput.value);
    const count = (original.match(regex) || []).length;
    
    textarea.value = replaced;
    
    toast(`Replaced ${count} occurrence${count !== 1 ? 's' : ''}`, 'success');
    performSearch();
  } catch(e) {
    toast(`Replace all failed: ${e.message}`, 'error');
  }
}

/* ================= EDITOR & PUSH ================= */
async function openEditor(file) {
  currentFile=file; 
  $('editor-title').textContent=`Editing: ${file.name}`; 
  $('editor-code').value='Loading...'; 
  
  // Reset search state
  $('find-input').value = '';
  $('replace-input').value = '';
  $('match-count').textContent = '0 matches';
  matches = [];
  currentMatchIndex = -1;
  searchRegex = false;
  caseSensitive = false;
  replaceMode = false;
  $('regex-btn').classList.remove('active');
  $('case-btn').classList.remove('active');
  $('replace-btn').classList.remove('active');
  $('replace-row').style.display = 'none';
  
  openModal('editor-modal');
  try { 
    const r=await fetch(file.download_url); 
    $('editor-code').value=await r.text();
    setTimeout(performSearch, 100);
  } catch(e) { 
    $('editor-code').value=`Error: ${e.message}`; 
  }
}

async function directPushFromEditor() {
  if(!currentFile) return;
  const newContent = $('editor-code').value;
  const btn = $('editor-push-btn');
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ Pushing...';
  btn.disabled = true;

  try {
    await api('PUT', currentFile.path, {
      message: 'Update via Nexus Dev Env',
      content: b64enc(newContent),
      sha: currentFile.sha,
      branch: cfg.branch
    });
    toast(`"${currentFile.name}" pushed successfully!`, 'success');
    closeModal('editor-modal');
    await loadFiles();
  } catch(e) {
    toast(`Push failed: ${e.message}`, 'error');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

function queueDelete() {
  if(!currentFile) return;
  deleteTarget = currentFile;
  $('del-target').textContent = currentFile.name;
  closeModal('editor-modal');
  openModal('delete-modal');
}

/* ================= DELETE ================= */
async function confirmDelete() {
  if(!deleteTarget) return;
  const btn = event.target;
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ Deleting...';
  btn.disabled = true;

  try {
    await api('DELETE', deleteTarget.path, {
      message: 'Delete via Nexus Dev Env',
      sha: deleteTarget.sha,
      branch: cfg.branch
    });
    
    toast(`🗑️ "${deleteTarget.name}" deleted and pushed!`, 'success');
    closeModal('delete-modal');
    deleteTarget = null;
    await loadFiles();
    
    if (cfg.path) {
      try {
        await api('GET', cfg.path);
      } catch (e) {
        if (e.message.includes('404')) {
          cfg.path = '';
          await loadFiles();
        }
      }
    }
    
  } catch(e) {
    toast(`Delete failed: ${e.message}`, 'error');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

/* ================= CREATE ================= */
function createNew(type) { 
  createMode=type; 
  $('create-title').textContent=`Create ${type==='file'?'File':'Folder'}`; 
  $('create-name').value=''; 
  $('create-content').value=''; 
  $('create-content-wrap').style.display=type==='file'?'flex':'none'; 
  openModal('create-modal');
  setTimeout(() => $('create-name').focus(), 200);
}
async function executeCreate() {
  const name=$('create-name').value.trim(); 
  if(!name) return toast('Name required','error');
  const path = cfg.path?`${cfg.path}/${name}`:name;
  const actualPath = createMode==='folder'?`${path}/.gitkeep`:path;
  const content = createMode==='folder'?'':$('create-content').value;
  
  const btn = event ? event.target : document.querySelector('#create-modal .push-btn');
  const originalText = btn.innerHTML;
  btn.innerHTML = '⏳ Creating...';
  btn.disabled = true;

  try {
    await api('PUT', actualPath, {
      message: 'Create via Nexus Dev Env',
      content: b64enc(content),
      branch: cfg.branch
    });
    toast(`"${name}" created and pushed!`, 'success');
    closeModal('create-modal');
    await loadFiles();
  } catch(e) {
    toast(`Creation failed: ${e.message}`, 'error');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

/* ================= FILE UPLOAD ================= */
async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const uploadBtn = document.querySelector('.btn-success');
  uploadBtn.disabled = true;
  uploadBtn.textContent = '⏳ Uploading...';

  const commitMessage = `Upload ${file.name} via Nexus Dev Env`;
  toast(`⏳ Uploading ${file.name}...`, 'info');

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const base64Content = e.target.result.split(',')[1];
      const filePath = cfg.path ? `${cfg.path}/${file.name}` : file.name;

      let sha = null;
      try {
        const check = await api('GET', filePath);
        sha = check.sha;
      } catch (err) {}

      await api('PUT', filePath, {
        message: commitMessage,
        content: base64Content,
        sha: sha || undefined,
        branch: cfg.branch
      });

      toast(`✅ '${file.name}' uploaded and pushed!`, 'success');
      await loadFiles();
      
    } catch (err) {
      toast(`❌ Upload failed: ${err.message}`, 'error');
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = '📤 Upload File';
      event.target.value = '';
    }
  };
  
  reader.onerror = function() {
    toast('❌ Failed to read file', 'error');
    uploadBtn.disabled = false;
    uploadBtn.textContent = '📤 Upload File';
    event.target.value = '';
  };
  
  reader.readAsDataURL(file);
}

/* ================= KEYBOARD EVENTS ================= */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const activeModals = document.querySelectorAll('.modal-overlay.active');
    if (activeModals.length) {
      e.preventDefault();
      activeModals.forEach(m => m.classList.remove('active'));
      return;
    }
    // If search input has focus and is not empty, clear it
    const searchInput = $('file-search-input');
    if (document.activeElement === searchInput && searchInput.value) {
      clearSearch();
      return;
    }
  }
  
  if (document.querySelector('.modal-overlay.active')) {
    if (e.key === 'F3' && document.getElementById('editor-modal').classList.contains('active')) {
      e.preventDefault();
      const findInput = $('find-input');
      if (document.activeElement !== findInput) {
        findNext();
      }
    }
    if (e.key === 'f' && (e.ctrlKey || e.metaKey) && document.getElementById('editor-modal').classList.contains('active')) {
      e.preventDefault();
      $('find-input').focus();
      $('find-input').select();
    }
    return;
  }
  
  // Ctrl+F to focus search when not in editor
  if (e.key === 'f' && (e.ctrlKey || e.metaKey) && !document.querySelector('.modal-overlay.active')) {
    e.preventDefault();
    $('file-search-input').focus();
    $('file-search-input').select();
  }
  
  if (e.key === 'Backspace' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') { 
    e.preventDefault(); 
    if(cfg.path){
      const p=cfg.path.split('/');
      p.pop();
      navTo(p.join('/'));
    } 
  }
  
  if (e.key === 'Enter' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    const firstCard = document.querySelector('.file-card:not(.hidden)');
    if (firstCard) firstCard.click();
  }
});

/* ================= BOOTSTRAP ================= */
window.onload = () => {
  loadHistory();
  const saved = localStorage.getItem('nexus_cfg');
  if(saved) { 
    cfg=JSON.parse(saved); 
    $('auth-status').textContent='Connected'; 
    loadFiles(); 
  } else {
    openSettings(); 
  }
};
</script>
